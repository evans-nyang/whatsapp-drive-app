services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: whatsapp_drive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d whatsapp_drive"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"  # management UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  media-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "-m", "app.workers.media_worker"]
    env_file: .env
    volumes:
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 2

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["python", "-m", "app.workers.notification_worker"]
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
